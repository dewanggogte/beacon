name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          push: true
          platforms: linux/amd64
          tags: ghcr.io/dewanggogte/beacon:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: ArgoCD Rollout Restart
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Trigger rollout restart via REST API
        env:
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_TOKEN }}
          ARGOCD_APP: ${{ secrets.ARGOCD_APP }}
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
        run: |
          # Use REST API instead of gRPC CLI — more reliable over flaky networks
          # First sync the app (pulls latest image)
          curl -sf -X POST \
            "https://${ARGOCD_SERVER}/api/v1/applications/${ARGOCD_APP}/sync" \
            -H "Authorization: Bearer ${ARGOCD_AUTH_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"strategy":{"hook":{}},"prune":false}' \
            --max-time 30 \
            --retry 3 \
            --retry-delay 10 || true

          # Then trigger a resource action to restart the deployment
          curl -sf -X POST \
            "https://${ARGOCD_SERVER}/api/v1/applications/${ARGOCD_APP}/resource/actions" \
            -H "Authorization: Bearer ${ARGOCD_AUTH_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"namespace\":\"beacon\",\"resourceName\":\"beacon\",\"version\":\"v1\",\"kind\":\"Deployment\",\"group\":\"apps\",\"action\":\"restart\"}" \
            --max-time 30 \
            --retry 3 \
            --retry-delay 10
